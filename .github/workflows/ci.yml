name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install -e .

      - name: Run Tests
        env:
          CUDA_VISIBLE_DEVICES: ""
        run: python -m pytest -q tests

      - name: Syntax Smoke
        run: |
          python -m compileall -q kerrtrace tests scripts
          python -m kerrtrace.starship_video --help > /dev/null

      - name: CLI Smoke Render
        env:
          CUDA_VISIBLE_DEVICES: ""
        run: |
          python -m kerrtrace \
            --width 64 \
            --height 64 \
            --device cpu \
            --max-steps 64 \
            --step-size 0.3 \
            --disable-progress-bar \
            --output out/ci_smoke.png
